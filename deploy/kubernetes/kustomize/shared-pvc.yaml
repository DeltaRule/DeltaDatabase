# Shared PersistentVolumeClaim used by the Main Worker and all Processing Workers.
# Uses the SeaweedFS CSI StorageClass (seaweedfs-storage) which supports
# ReadWriteMany so that the Main Worker and every Processing Worker replica can
# mount the volume simultaneously, even when pods are spread across multiple nodes.
#
# Prerequisites:
#   SeaweedFS must be deployed in the cluster and its CSI driver must have
#   created the 'seaweedfs-storage' StorageClass.  The GitHub Actions deploy
#   workflow installs SeaweedFS automatically when it is not yet present.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: delta-shared-pvc
  namespace: deltadatabase
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: seaweedfs-storage

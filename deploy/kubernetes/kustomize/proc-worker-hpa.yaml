# HorizontalPodAutoscaler for the Processing Workers.
#
# Starts at 1 replica and scales based on average memory utilisation (deallocation-based).
# Scaling down is triggered when memory is deallocated (utilisation drops below the target),
# avoiding unnecessary CPU-spike-driven scale events for I/O-bound JSON workloads.
#
# Tune minReplicas, maxReplicas, and the memory target to match your workload.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proc-worker-hpa
  namespace: deltadatabase
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proc-worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

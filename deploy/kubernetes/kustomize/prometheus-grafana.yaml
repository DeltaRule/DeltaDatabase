---
# RBAC: allow Prometheus to discover pods and endpoints via the Kubernetes API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: deltadatabase

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-deltadatabase
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - nonResourceURLs: ["/metrics"]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-deltadatabase
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-deltadatabase
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: deltadatabase

---
# ConfigMap: Prometheus scrape configuration using Kubernetes service-discovery.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: deltadatabase
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: deltadatabase_main
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: [deltadatabase]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: main-worker-metrics
          - target_label: worker_type
            replacement: main

      - job_name: deltadatabase_proc
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [deltadatabase]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: proc-worker
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - target_label: worker_type
            replacement: proc

---
# Prometheus Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: deltadatabase
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3.2.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          emptyDir: {}

---
# Service: expose Prometheus inside the cluster.
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: deltadatabase
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
  type: ClusterIP

---
# ConfigMap: Grafana datasource — points at the in-cluster Prometheus service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: deltadatabase
data:
  prometheus.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
# ConfigMap: Grafana dashboard provisioning configuration.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: deltadatabase
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: DeltaDatabase
        orgId: 1
        folder: DeltaDatabase
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

---
# Grafana Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: deltadatabase
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.5.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: web
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboards
          configMap:
            name: grafana-dashboard-deltadatabase
        - name: storage
          emptyDir: {}

---
# Service: expose Grafana inside the cluster.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: deltadatabase
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
  type: ClusterIP

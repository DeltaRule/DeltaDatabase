# Kustomize overlay: SeaweedFS shared filesystem + autoscaling + Prometheus & Grafana.
#
# Deploys the full DeltaDatabase stack with:
#   - SeaweedFS StorageClass (seaweedfs-storage) backed by the SeaweedFS CSI driver
#   - Shared PVC (ReadWriteMany, seaweedfs-storage) for the filesystem backend,
#     allowing all pods to mount the volume simultaneously across any node
#   - Main Worker and Processing Workers
#   - Memory-based HorizontalPodAutoscaler (deallocation-driven scaling)
#   - Prometheus scraping both workers via Kubernetes service-discovery
#   - Grafana with the pre-built DeltaDatabase dashboard
#
# Prerequisites:
#   - Kubernetes cluster v1.26+ with the Metrics Server installed:
#       kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#   - SeaweedFS with its CSI driver deployed in the cluster so that the
#     'seaweedfs-storage' StorageClass is available (ReadWriteMany capable).
#     The GitHub Actions deploy workflow installs SeaweedFS automatically via
#     Helm when it is not yet present.
#   - A master-key secret (create once before applying):
#       kubectl create namespace deltadatabase
#       kubectl -n deltadatabase create secret generic delta-master-key \
#         --from-literal=master-key="$(openssl rand -hex 32)"
#
# Apply:
#   kubectl apply -k deploy/kubernetes/kustomize
#
# Access:
#   kubectl -n deltadatabase port-forward svc/main-worker 8080:8080   # REST API
#   kubectl -n deltadatabase port-forward svc/grafana 3000:3000        # Grafana (admin/admin)
#   kubectl -n deltadatabase port-forward svc/prometheus 9090:9090     # Prometheus

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deltadatabase

resources:
  - namespace.yaml
  - seaweedfs-storageclass.yaml
  - shared-pvc.yaml
  - main-worker.yaml
  - proc-worker.yaml
  - proc-worker-hpa.yaml
  - monitoring-resources.yaml
  - prometheus-grafana.yaml

patches:
  - path: patches/main-worker-metrics.yaml
  - path: patches/proc-worker-metrics.yaml

configMapGenerator:
  - name: grafana-dashboard-deltadatabase
    options:
      disableNameSuffixHash: true
    files:
      - deltadatabase.json=deltadatabase-dashboard.json

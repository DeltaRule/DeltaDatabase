# Shared PersistentVolumeClaim used by the Main Worker and all Processing Workers.
# Uses the local-path StorageClass (rancher.io/local-path) which is available by
# default on many lightweight clusters (k3s, Rancher Desktop, etc.).
# Note: local-path only supports ReadWriteOnce — all pods sharing this volume
# must be scheduled on the same node.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: delta-shared-pvc
  namespace: deltadatabase
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
